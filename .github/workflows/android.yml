name: Build Android APK

# Собирает APK из Kivy-версии (main.py) через Buildozer в облаке GitHub.
# Запуск: при push в main (если менялись main.py/buildozer.spec/workflow),
# либо вручную: вкладка Actions -> Build Android APK -> Run workflow.
on:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build-android:
    # 22.04: на нём есть libtinfo5, нужный тулчейну Android NDK.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install "cython==0.29.36" buildozer

      - name: Cache Buildozer directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: |
          # Первый прогон скачивает Android SDK/NDK. Он может упасть на приёмке
          # лицензии для свежих build-tools (buildozer тянет preview 37.0.0),
          # поэтому глушим ошибку, затем принимаем ВСЕ лицензии SDK (включая
          # preview) его же sdkmanager и собираем начисто. SDK/NDK уже на диске,
          # так что второй прогон переиспользует их и не качает заново.
          buildozer android debug || true
          SDKMANAGER=$(find ~/.buildozer/android/platform/android-sdk -name sdkmanager -type f | head -n1)
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses || true
          fi
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breathwimhof-debug-apk
          path: bin/*.apk
          if-no-files-found: error
